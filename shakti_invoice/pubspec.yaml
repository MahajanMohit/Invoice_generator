name: shakti_invoice
description: Shakti General Store - Invoice Generator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.9.0

  # File system
  path_provider: ^2.1.1

  # PDF generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Date formatting
  intl: ^0.19.0

  # Share files
  share_plus: ^7.2.1

  # Open files (PDF viewer)
  open_filex: ^4.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
