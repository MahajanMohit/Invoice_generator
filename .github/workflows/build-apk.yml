name: Build Android APK

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'shakti_invoice/**'
  workflow_dispatch:   # lets you trigger it manually from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: shakti_invoice
        run: flutter pub get

      - name: Generate missing Android project files
        working-directory: shakti_invoice
        run: |
          # Save our custom files (permissions, FileProvider config)
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          cp android/app/src/main/res/xml/file_paths.xml /tmp/file_paths.xml

          # Let Flutter generate the complete Android project structure
          # (build.gradle, settings.gradle, gradlew, MainActivity.kt, etc.)
          flutter create --platforms android --project-name shakti_invoice .

          # Restore our custom files
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp /tmp/file_paths.xml android/app/src/main/res/xml/file_paths.xml

      - name: Build release APK
        working-directory: shakti_invoice
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shakti-invoice-apk
          path: shakti_invoice/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
