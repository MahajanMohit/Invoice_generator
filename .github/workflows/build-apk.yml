name: Build Android APK

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'shakti_invoice/**'
  workflow_dispatch:   # lets you trigger it manually from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: shakti_invoice
        run: flutter pub get

      - name: Generate gradle wrapper (binary files only)
        working-directory: shakti_invoice
        run: |
          # Save all our committed Android files
          cp -r android /tmp/android_backup

          # Run flutter create only to generate binary wrapper files
          # (gradlew shell script + gradle-wrapper.jar)
          flutter create --platforms android --project-name shakti_invoice . --quiet

          # Restore all our committed files (build.gradle, settings.gradle,
          # gradle.properties, MainActivity.kt, AndroidManifest.xml, etc.)
          cp -r /tmp/android_backup/. android/

      - name: Build release APK
        working-directory: shakti_invoice
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shakti-invoice-apk
          path: shakti_invoice/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
